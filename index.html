<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>모두의 가천대 수리논술 LAB</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--bg:#f6f7fb;--card:#ffffff;--accent:#2563eb;}
  *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;background:radial-gradient(circle at top,#e0f2fe,#f8fafc 40%,#eef2ff);color:var(--ink)}
  header{padding:28px 20px 14px;text-align:center} h1{margin:0;font-size:clamp(25px,4vw,42px);letter-spacing:-1px} .sub{color:var(--muted);margin-top:8px}.copy{font-family:cursive;font-size:20px;font-weight:700;margin-top:8px;color:#334155}
  .panel{max-width:1100px;margin:18px auto;padding:18px;background:rgba(255,255,255,.82);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.9);border-radius:24px;box-shadow:0 20px 60px rgba(15,23,42,.12)}
  .buttons{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}.btn{border:0;border-radius:999px;padding:13px 18px;font-weight:800;cursor:pointer;background:#111827;color:white;box-shadow:0 8px 20px rgba(0,0,0,.12)}.btn.secondary{background:#2563eb}.btn.light{background:white;color:#111827;border:1px solid var(--line)}.btn.warn{background:#dc2626}.btn:disabled{opacity:.45;cursor:not-allowed}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:14px}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;text-align:center}.stat b{font-size:22px;display:block}
  .notice{font-size:14px;color:#475569;line-height:1.65;margin-top:12px;text-align:center}.loading{text-align:center;font-weight:800;color:#2563eb;margin:20px}.hidden{display:none!important}
  .paper{max-width:920px;margin:22px auto;background:white;border-radius:18px;box-shadow:0 16px 60px rgba(15,23,42,.12);overflow:hidden}.paper-head{padding:28px 34px;border-bottom:3px solid #111827}.paper-head h2{margin:0;font-size:26px}.meta{display:flex;gap:16px;flex-wrap:wrap;margin-top:16px}.field{border-bottom:1.5px solid #111827;min-width:160px;padding:4px 8px;color:#6b7280}.question{padding:24px 34px;border-bottom:1px dashed #cbd5e1;break-inside:avoid;page-break-inside:avoid}.qtitle{font-size:18px;font-weight:900;margin-bottom:12px;display:flex;justify-content:space-between}.code{font-size:12px;color:#64748b;font-weight:700}.crop-img{width:100%;max-width:760px;display:block;margin:6px auto 12px;border:1px solid #f1f5f9}.answer-space{height:220px;border:1px solid #d1d5db;background:repeating-linear-gradient(white,white 27px,#eef2f7 28px);border-radius:10px;margin-top:14px;position:relative}.answer-space::before{content:'풀이 과정';position:absolute;top:8px;left:12px;color:#94a3b8;font-size:13px;font-weight:700}.answer-line{margin-top:12px;border-bottom:1.5px solid #111827;width:220px;padding:4px;color:#64748b}.solution-card{background:#fffdf5;border:1px solid #fde68a;border-radius:14px;padding:12px;margin-top:10px}
  footer{text-align:center;color:#64748b;margin:30px 0 50px;font-size:13px}
  @media print{body{background:white} header,.panel,.no-print,footer{display:none!important}.paper{box-shadow:none;margin:0;max-width:none;border-radius:0}.paper-head{padding:18mm 12mm 8mm}.question{padding:8mm 12mm}.crop-img{max-width:100%;border:0}.answer-space{height:76mm}.solution-card{border:0;padding:0}.page-break{page-break-before:always}.code{color:#444}@page{size:A4;margin:10mm}}
</style>
</head>
<body>
<header>
  <h1>모두의 가천대 수리논술 LAB</h1>
  <div class="sub">수학Ⅰ·수학Ⅱ 균형 랜덤 출제 · 중복 방지 · 시험지/정답풀이 분리 출력</div>
  <div class="copy">Copyright@All Teachers</div>
</header>
<section class="panel no-print">
  <div class="buttons">
    <button class="btn secondary" id="makeBtn">🎲 8문항 랜덤 시험지 생성</button>
    <button class="btn" id="printExamBtn" disabled>🖨 시험지 인쇄/PDF</button>
    <button class="btn" id="printSolBtn" disabled>✅ 정답·풀이 인쇄/PDF</button>
    <button class="btn light" id="showSolBtn" disabled>정답·풀이 화면 보기</button>
    <button class="btn warn" id="resetBtn">출제 기록 초기화</button>
  </div>
  <div class="stats">
    <div class="stat"><b id="totalCount">-</b>전체 문항</div>
    <div class="stat"><b id="usedCount">-</b>출제 기록</div>
    <div class="stat"><b id="leftCount">-</b>남은 문항</div>
    <div class="stat"><b>4+4</b>수Ⅰ·수Ⅱ 구성</div>
  </div>
  <div class="notice">이미지 파일 수를 줄이기 위해 PDF 원본 2개만 사용합니다. GitHub Pages에 올리면 바로 작동합니다. 출력은 브라우저 인쇄 창에서 “PDF로 저장”을 선택하면 됩니다.</div>
</section>
<div class="loading hidden" id="loading">문항 이미지를 불러오는 중입니다...</div>
<main id="examPaper" class="paper hidden"></main>
<main id="solutionPaper" class="paper hidden"></main>
<footer>modu-gachon-math-lab · PDF 기반 경량 버전</footer>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let questions=[], selected=[], pdfCache={};
const $=id=>document.getElementById(id);
function usedSet(){return new Set(JSON.parse(localStorage.getItem('modu_gachon_used')||'[]'))}
function saveUsed(codes){const s=usedSet();codes.forEach(c=>s.add(c));localStorage.setItem('modu_gachon_used',JSON.stringify([...s]));updateStats()}
function updateStats(){const u=usedSet();$('totalCount').textContent=questions.length;$('usedCount').textContent=[...u].filter(x=>questions.some(q=>q.id===x)).length;$('leftCount').textContent=questions.filter(q=>!u.has(q.id)).length}
async function loadPDF(name){if(!pdfCache[name]) pdfCache[name]=await pdfjsLib.getDocument('pdfs/'+name).promise; return pdfCache[name]}
function pickBalanced(subject,n){let u=usedSet();let pool=questions.filter(q=>q.subject===subject&&!u.has(q.id));if(pool.length<n){pool=questions.filter(q=>q.subject===subject);}
  const by={};pool.forEach(q=>{(by[q.lesson]??=[]).push(q)});let lessons=Object.keys(by).sort(()=>Math.random()-.5);let out=[];
  while(out.length<n && lessons.length){for(const les of [...lessons]){if(out.length>=n)break;const arr=by[les].filter(q=>!out.includes(q));if(arr.length){out.push(arr[Math.floor(Math.random()*arr.length)]);}lessons=lessons.filter(l=>by[l].some(q=>!out.includes(q)));}}
  while(out.length<n){let rest=pool.filter(q=>!out.includes(q));if(!rest.length)break;out.push(rest[Math.floor(Math.random()*rest.length)]);}return out}
async function cropSegment(q,seg){const pdf=await loadPDF(q.pdf);const page=await pdf.getPage(seg.page);const scale=2.2;const viewport=page.getViewport({scale});const canvas=document.createElement('canvas');const ctx=canvas.getContext('2d');canvas.width=viewport.width;canvas.height=viewport.height;await page.render({canvasContext:ctx,viewport}).promise;const x0=seg.x0*scale,y0=seg.y0*scale,w=(seg.x1-seg.x0)*scale,h=(seg.y1-seg.y0)*scale;const c=document.createElement('canvas');c.width=w;c.height=h;const cctx=c.getContext('2d');cctx.fillStyle='white';cctx.fillRect(0,0,w,h);cctx.drawImage(canvas,x0,y0,w,h,0,0,w,h);return c.toDataURL('image/jpeg',0.92)}
async function renderQImages(q,type){const segs= type==='problem'?q.problemSegments:q.solutionSegments;let html='';for(const seg of segs){const url=await cropSegment(q,seg);html+=`<img class="crop-img" src="${url}" alt="${q.id}">`;}return html}
async function buildExam(){selected=[...pickBalanced('수학Ⅰ',4),...pickBalanced('수학Ⅱ',4)].sort(()=>Math.random()-.5);saveUsed(selected.map(q=>q.id));$('loading').classList.remove('hidden');$('examPaper').classList.add('hidden');$('solutionPaper').classList.add('hidden');let html=`<div class="paper-head"><h2>가천대학교 수리논술 모의 연습지</h2><div class="meta"><div class="field">성명</div><div class="field">반/번호</div><div class="field">시험시간 80분</div></div></div>`;let i=1;for(const q of selected){html+=`<section class="question"><div class="qtitle"><span>[문제 ${i}] ${q.subject}</span><span class="code">${q.id} · ${q.lesson}</span></div>${await renderQImages(q,'problem')}<div class="answer-space"></div><div class="answer-line">답 :</div></section>`;i++;}$('examPaper').innerHTML=html;$('examPaper').classList.remove('hidden');$('loading').classList.add('hidden');$('printExamBtn').disabled=false;$('printSolBtn').disabled=false;$('showSolBtn').disabled=false}
async function buildSolutions(show=true){if(!selected.length)return;$('loading').classList.remove('hidden');let html=`<div class="paper-head"><h2>정답 및 풀이</h2><div class="meta"><div class="field">생성 문항 ${selected.length}개</div><div class="field">${new Date().toLocaleDateString('ko-KR')}</div></div></div>`;let i=1;for(const q of selected){html+=`<section class="question"><div class="qtitle"><span>[문제 ${i}] 정답·풀이</span><span class="code">${q.id} · ${q.lesson}</span></div><div class="solution-card">${await renderQImages(q,'solution')}</div></section>`;i++;}$('solutionPaper').innerHTML=html;if(show){$('solutionPaper').classList.remove('hidden');window.scrollTo({top:$('solutionPaper').offsetTop-20,behavior:'smooth'});}$('loading').classList.add('hidden')}
$('makeBtn').onclick=buildExam;
$('showSolBtn').onclick=()=>buildSolutions(true);
$('printExamBtn').onclick=()=>{document.body.classList.remove('solution-mode');$('solutionPaper').classList.add('hidden');$('examPaper').classList.remove('hidden');setTimeout(()=>print(),250)};
$('printSolBtn').onclick=async()=>{await buildSolutions(false);$('examPaper').classList.add('hidden');$('solutionPaper').classList.remove('hidden');setTimeout(()=>print(),250)};
$('resetBtn').onclick=()=>{if(confirm('출제 기록을 초기화할까요?')){localStorage.removeItem('modu_gachon_used');updateStats()}};
(async()=>{questions=await fetch('data/questions.json').then(r=>r.json());updateStats();})();
</script>
</body>
</html>
